version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - cloud-network

  backend:
    build: ./backend
    ports:
      - "8081:3000"
    environment:
      KEY_VAULT_URL: ${KEY_VAULT_URL}
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    # depends_on:
    #   db:
    #     condition: service_healthy
    networks:
      - cloud-network

