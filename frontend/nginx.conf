server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy – requests from browser go to Nginx, Nginx forwards
    # to backend container over internal Docker network (no CORS issues)
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback – needed for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
